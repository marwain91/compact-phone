[compactphone]
exten => 600,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

exten => 1001,1,Dial(PJSIP/1001,30)
 same => n,Hangup()

exten => 1002,1,Dial(PJSIP/1002,30)
 same => n,Hangup()

; Routing for inbound out-of-dialog SIP MESSAGE. ${MESSAGE(to)} is a
; full URI such as <sip:1001@host>; the lookup logic strips it down to
; the user portion and relays to the matching registered PJSIP endpoint.
[messaging]
exten => _.,1,Set(TO_USER=${CUT(CUT(MESSAGE(to),:,2),@,1)})
 same => n,MessageSend(pjsip:${TO_USER},${MESSAGE(from)})
 same => n,Hangup()

[global]
type=global
endpoint_identifier_order=username,ip

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Mac-host build sees Asterisk at 127.0.0.1 via Docker port publishing.
; Without this, Asterisk advertises its internal container IP
; (e.g. 192.168.144.2) in SDP c= and Contact, which is unroutable from
; the host. Force SDP/Contact to advertise the loopback address that
; matches the published port mapping.
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1
; Only treat the docker-internal bridge as local. The Mac host arrives
; at 192.168.65.1 (Docker Desktop gateway), which must be "external" so
; Asterisk substitutes external_media_address in SDP/Contact.
local_net=192.168.144.0/24
local_net=172.16.0.0/12

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/tls/server.crt
priv_key_file=/etc/asterisk/tls/server.key
method=tlsv1_2

[endpoint-template](!)
type=endpoint
context=compactphone
; Inbound out-of-dialog SIP MESSAGEs land in the [messaging] context so
; the dialplan can re-route them to the addressed endpoint via MessageSend.
message_context=messaging
disallow=all
allow=opus
allow=g722
allow=ulaw
allow=alaw
direct_media=no
; NAT helpers — the host-side macOS app sits behind Docker Desktop's
; gateway and advertises a different SDP address than Asterisk can see.
; rtp_symmetric=yes makes Asterisk send RTP back to the actual source
; of the first received packet rather than the SDP-advertised address.
; rewrite_contact=yes does the same for SIP signalling.
rtp_symmetric=yes
rewrite_contact=yes
force_rport=yes

[auth-template](!)
type=auth
auth_type=userpass

[aor-template](!)
type=aor
max_contacts=2
remove_existing=yes

[1001](endpoint-template)
auth=1001
aors=1001

[1001](auth-template)
password=compactphone1001
username=1001

[1001](aor-template)

[1002](endpoint-template)
auth=1002
aors=1002

[1002](auth-template)
password=compactphone1002
username=1002

[1002](aor-template)

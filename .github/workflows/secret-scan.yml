name: Secret scan

# Belt + braces. The .githooks/pre-commit gitleaks runs locally; this job
# runs on every push and every PR so a contributor who forgot to enable
# the hook still gets caught before code lands on a public release branch.

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG_PATH: .gitleaks.toml
        uses: gitleaks/gitleaks-action@v2

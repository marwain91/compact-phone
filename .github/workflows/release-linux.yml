name: Release · Linux

# Fires on every v* tag. Builds the binary inside the dev container
# (same image CI uses, so identical toolchain), bundles into an
# AppImage via linuxdeploy + linuxdeploy-plugin-qt, and uploads to
# the matching GitHub Release.
#
# Stable filename: Compact-Phone-Linux-x86_64.AppImage — landing page
# can hardcode .../releases/latest/download/<filename>. Matches the
# DMG / MSI pattern (see docs/download-urls.md).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to attach assets to the release

jobs:
  build-publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose -f tools/dev/docker-compose.yml build dev

      - name: Start dev container
        run: docker compose -f tools/dev/docker-compose.yml up -d dev

      - name: Configure + build
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c "cmake --preset linux && cmake --build --preset linux"

      - name: Bundle into AppImage
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c '
              set -euo pipefail
              cd /workspace

              # Install runtime deps needed by linuxdeploy (the dev image
              # already has most build deps but not these specific tools).
              apt-get update -qq && apt-get install -y -qq --no-install-recommends \
                  file desktop-file-utils zsync

              # Stage the AppDir layout that linuxdeploy expects.
              rm -rf AppDir
              mkdir -p AppDir/usr/bin
              mkdir -p AppDir/usr/share/applications
              mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

              cp build/linux/src/compactphone AppDir/usr/bin/
              cp packaging/linux/compactphone.desktop \
                  AppDir/usr/share/applications/
              cp branding/generated/icon_256x256.png \
                  AppDir/usr/share/icons/hicolor/256x256/apps/compactphone.png

              # Download linuxdeploy + the Qt plugin. Pinning to
              # continuous releases — there is no semver-tagged release.
              cd /tmp
              wget -q -O linuxdeploy.AppImage \
                  https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
              wget -q -O linuxdeploy-plugin-qt.AppImage \
                  https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
              chmod +x linuxdeploy.AppImage linuxdeploy-plugin-qt.AppImage

              # APPIMAGE_EXTRACT_AND_RUN=1 lets these AppImages run
              # without FUSE — docker containers do not have /dev/fuse
              # by default. linuxdeploy unpacks itself + the plugin
              # to /tmp, runs from there.
              export APPIMAGE_EXTRACT_AND_RUN=1

              # Point the Qt plugin at vcpkg-installed Qt.
              export QMAKE=/workspace/build/linux/vcpkg_installed/x64-linux/tools/qt6/bin/qmake6
              export QML_SOURCES_PATHS=/workspace/src/ui/qml

              cd /workspace
              /tmp/linuxdeploy.AppImage \
                  --appdir AppDir \
                  --plugin qt \
                  --output appimage \
                  --desktop-file AppDir/usr/share/applications/compactphone.desktop \
                  --icon-file branding/generated/icon_256x256.png

              # linuxdeploy names the output Compact_Phone-<arch>.AppImage
              # (replaces spaces with underscores). Move to the stable
              # filename the landing page hardcodes.
              mkdir -p dist
              mv Compact_Phone*-x86_64.AppImage dist/Compact-Phone-Linux-x86_64.AppImage
              chmod +x dist/Compact-Phone-Linux-x86_64.AppImage
              ls -la dist/
            '

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
          fail_on_unmatched_files: true

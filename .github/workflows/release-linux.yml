name: Release · Linux

# Fires on every v* tag. Builds the binary inside the dev container
# (same image CI uses, so identical toolchain), bundles into an
# AppImage via linuxdeploy, and uploads to the matching GitHub Release.
#
# Stable filename: Compact-Phone-Linux-x86_64.AppImage — landing page
# can hardcode .../releases/latest/download/<filename>. Matches the
# DMG / MSI pattern (see docs/download-urls.md).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to attach assets to the release
  packages: read    # needed to pull the Linux builder image from GHCR

jobs:
  build-publish:
    runs-on: ubuntu-22.04
    env:
      VCPKG_ARCHIVES_DIR: ${{ github.workspace }}/.vcpkg-cache
      COMPACTPHONE_DEV_IMAGE: ghcr.io/${{ github.repository }}/linux-builder:latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_ARCHIVES_DIR"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}
          restore-keys: |
            vcpkg-linux-partial-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}-
            vcpkg-linux-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Linux builder image
        id: builder-image
        continue-on-error: true
        run: docker pull "$COMPACTPHONE_DEV_IMAGE"

      - name: Build dev image fallback
        if: steps.builder-image.outcome != 'success'
        uses: docker/build-push-action@v6
        with:
          context: tools/dev
          load: true
          tags: ${{ env.COMPACTPHONE_DEV_IMAGE }}
          cache-from: type=gha,scope=compactphone-dev-${{ runner.os }}
          cache-to: type=gha,scope=compactphone-dev-${{ runner.os }},mode=max

      - name: Start dev container
        run: docker compose -f tools/dev/docker-compose.yml up -d --no-build dev

      - name: Configure + build
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c "cmake --preset linux && cmake --build --preset linux"

      - name: Bundle into AppImage
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash tools/release/build-linux-appimage.sh

      - name: Save vcpkg binary cache
        if: success() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Save partial vcpkg binary cache
        if: failure()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-partial-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
          fail_on_unmatched_files: true

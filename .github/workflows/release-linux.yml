name: Release · Linux

# Fires on every v* tag. Builds the binary inside the dev container
# (same image CI uses, so identical toolchain), bundles into an
# AppImage via linuxdeploy, and uploads to the matching GitHub Release.
#
# Stable filename: Compact-Phone-Linux-x86_64.AppImage — landing page
# can hardcode .../releases/latest/download/<filename>. Matches the
# DMG / MSI pattern (see docs/download-urls.md).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0-test7"
        required: true
        type: string
      source_ref:
        description: "Git ref to build. Empty = selected workflow ref."
        required: false
        default: ""
        type: string

permissions:
  contents: write   # needed to attach assets to the release
  packages: read    # needed to pull the Linux builder image from GHCR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

jobs:
  build-publish:
    runs-on: ubuntu-22.04
    env:
      VCPKG_ARCHIVES_DIR: ${{ github.workspace }}/.vcpkg-cache
      COMPACTPHONE_DEV_IMAGE: ghcr.io/${{ github.repository }}/linux-builder:latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Validate release tag
        run: |
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "error: release tag must start with v; got '$RELEASE_TAG'" >&2
            exit 1
          fi
          python3 tools/release/verify-release-version.py "$RELEASE_TAG"

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_ARCHIVES_DIR"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}
          restore-keys: |
            vcpkg-linux-partial-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}-
            vcpkg-linux-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Linux builder image
        id: builder-image
        continue-on-error: true
        run: docker pull "$COMPACTPHONE_DEV_IMAGE"

      - name: Build dev image fallback
        if: steps.builder-image.outcome != 'success'
        uses: docker/build-push-action@v7
        with:
          context: tools/dev
          load: true
          tags: ${{ env.COMPACTPHONE_DEV_IMAGE }}
          cache-from: type=gha,scope=compactphone-dev-${{ runner.os }}
          cache-to: type=gha,scope=compactphone-dev-${{ runner.os }},mode=max

      - name: Start dev container
        run: docker compose -f tools/dev/docker-compose.yml up -d --no-build dev

      - name: Configure + build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          sentry_args=()
          if [[ -n "${SENTRY_DSN:-}" ]]; then
            sentry_args+=("-DVCPKG_MANIFEST_FEATURES=sentry")
            sentry_args+=("-DCOMPACTPHONE_ENABLE_SENTRY=ON")
            sentry_args+=("-DCOMPACTPHONE_SENTRY_DSN=${SENTRY_DSN}")
          fi
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -lc 'cmake --preset linux "$@" && cmake --build --preset linux' \
            bash "${sentry_args[@]}"

      - name: Bundle into AppImage
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash tools/release/build-linux-appimage.sh

      - name: Generate Linux appcast
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
          REF_NAME: ${{ env.RELEASE_TAG }}
        run: |
          if [[ -n "${SPARKLE_ED25519_PRIVATE_KEY:-}" ]]; then
            python3 -m pip install --quiet --user cryptography
          fi
          VERSION="${REF_NAME#v}"
          APPIMAGE=$(find dist -maxdepth 1 -type f -name '*.AppImage' | head -n 1)
          if [[ -z "$APPIMAGE" ]]; then
            echo "error: AppImage not found under dist" >&2
            exit 1
          fi
          APPIMAGE_NAME=$(basename "$APPIMAGE")
          python3 tools/release/generate-appcast.py \
            --version "$VERSION" \
            --asset-url "https://github.com/marwain91/compact-phone/releases/download/${REF_NAME}/${APPIMAGE_NAME}" \
            --asset-file "$APPIMAGE" \
            --os linux \
            --output dist/appcast-linux.xml

      - name: Save vcpkg binary cache
        if: success() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Save partial vcpkg binary cache
        if: failure()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-partial-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ contains(env.RELEASE_TAG, '-test') }}
          files: |
            dist/*.AppImage
            dist/appcast-linux.xml
          fail_on_unmatched_files: true

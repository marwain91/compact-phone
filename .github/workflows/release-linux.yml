name: Release · Linux

# Fires on every v* tag. Builds the binary inside the dev container
# (same image CI uses, so identical toolchain), bundles into an
# AppImage via linuxdeploy, and uploads to the matching GitHub Release.
#
# Stable filename: Compact-Phone-Linux-x86_64.AppImage — landing page
# can hardcode .../releases/latest/download/<filename>. Matches the
# DMG / MSI pattern (see docs/download-urls.md).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to attach assets to the release

jobs:
  build-publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose -f tools/dev/docker-compose.yml build dev

      - name: Start dev container
        run: docker compose -f tools/dev/docker-compose.yml up -d dev

      - name: Configure + build
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c "cmake --preset linux && cmake --build --preset linux"

      - name: Bundle into AppImage
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash tools/release/build-linux-appimage.sh

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
          fail_on_unmatched_files: true

name: CI

on:
  # Manual only. This workflow builds the Linux dev container, restores or
  # builds vcpkg/Qt dependencies, compiles the app, and runs tests. It can
  # take close to an hour on a cold cache, so it must not run automatically
  # for every PR or merge.
  workflow_dispatch:

# Auto-cancel older manual runs on the same ref when a new run starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux-dev-container:
    name: Linux dev container build + unit tests
    runs-on: ubuntu-22.04
    env:
      VCPKG_ARCHIVES_DIR: ${{ github.workspace }}/.vcpkg-cache
      COMPACTPHONE_DEV_IMAGE: ghcr.io/${{ github.repository }}/linux-builder:latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_ARCHIVES_DIR"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}
          restore-keys: |
            vcpkg-linux-partial-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}-
            vcpkg-linux-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Linux builder image
        id: builder-image
        continue-on-error: true
        run: docker pull "$COMPACTPHONE_DEV_IMAGE"

      - name: Build dev image fallback
        if: steps.builder-image.outcome != 'success'
        uses: docker/build-push-action@v7
        with:
          context: tools/dev
          load: true
          tags: ${{ env.COMPACTPHONE_DEV_IMAGE }}
          cache-from: type=gha,scope=compactphone-dev-${{ runner.os }}
          cache-to: type=gha,scope=compactphone-dev-${{ runner.os }},mode=max

      - name: Start dev container
        run: docker compose -f tools/dev/docker-compose.yml up -d --no-build dev

      - name: Configure
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            cmake --preset linux

      - name: Build
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            cmake --build --preset linux

      - name: Run unit tests
        # Full suite now that #17's two halves are fixed:
        # - Keychain (EVP_PKEY_HKDF crash) → switched to EVP_KDF in #23
        # - SipEngine / AccountsManagerUpdate (libsrtp self-test crash
        #   inside hmac_dup -> EVP_MAC_CTX_new) → PJSIP now linked
        #   against system libsrtp2 via --with-external-srtp in the
        #   Dockerfile, bypassing PJSIP's broken-on-OpenSSL3 bundled
        #   copy.
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c "cd /workspace/build/linux && \
              ctest --output-on-failure -L unit"

      # Kept as a safety net: if any test starts crashing again, we
      # get a backtrace inline in the job log instead of just SEGFAULT.
      # gdb installed in-step (not in Dockerfile) so it doesn't
      # invalidate the docker layer cache. test_unit existence is
      # checked first so we don't pile gdb noise on top of an
      # earlier build failure.
      - name: Diagnose segfaults if any (gdb backtrace)
        if: always()
        continue-on-error: true
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c 'set -e
              apt-get update -qq && apt-get install -y -qq --no-install-recommends gdb
              cd /workspace/build/linux
              if [ ! -x ./tests/test_unit ]; then
                echo "test_unit binary not built — skipping gdb diagnostic"
                exit 0
              fi
              ulimit -c unlimited
              for T in \
                "SipEngineLifecycle.StartsAndStops" \
                "AccountsManagerUpdateTest.UpdatePersistsChangedFields"; do
                echo "=== gdb backtrace: $T ==="
                gdb --batch --return-child-result \
                  -ex "set pagination off" \
                  -ex "run --gtest_filter=$T" \
                  -ex "bt full" \
                  -ex "info sharedlibrary" \
                  --args ./tests/test_unit --gtest_filter=$T 2>&1 | \
                  tail -200 || true
                echo
              done'

      # vcpkg writes per-port logs inside the container under
      # /opt/vcpkg/buildtrees/<port>/. Surfacing them on failure means
      # the next debug round does not need a fresh 1-hour build.
      - name: Collect vcpkg logs on failure
        if: failure()
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c 'mkdir -p /workspace/vcpkg-logs && \
              find /opt/vcpkg/buildtrees -maxdepth 2 -name "*.log" -size -50M \
                -exec cp --parents {} /workspace/vcpkg-logs/ \;' || true
      - name: Upload vcpkg logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vcpkg-logs-linux
          path: vcpkg-logs/
          if-no-files-found: ignore

      - name: Save vcpkg binary cache
        if: success() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Save partial vcpkg binary cache
        if: failure()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-partial-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}-${{ github.run_id }}-${{ github.run_attempt }}

  # Asterisk-backed integration suite (register, call, hold, transfer,
  # conference, DTMF, recording, mute, audio playback, live RTP stats). Uses
  # docker compose so the dev container reaches the Asterisk container by its
  # `asterisk:5060` alias — the same wiring as `make test-integration` locally.
  #
  # Runs on a GitHub-hosted arm64 runner (ubuntu-24.04-arm, free for public
  # repos — NOT self-hosted, which CLAUDE.md "Things I avoid" rules out). arm64
  # is deliberate: these tests do full pjsua2 audio init + live SIP calls, and
  # pjsua2 audio init SIGSEGVs on GitHub x86_64 runners (the same root cause the
  # unit job excludes SipEngineLifecycle for — see CLAUDE.md "Linux x86_64 unit
  # test segfaults"). arm64 matches the dev container / VPS where the suite is
  # green. Separate job so a media-stack crash here never masks the unit gate.
  #
  # NOTE: there is no prebuilt arm64 GHCR builder image, so this job cold-builds
  # the dev image (PJSIP) and the arm64-linux vcpkg deps (Qt) on first run —
  # long, but manual dispatch only and the vcpkg cache amortises later runs.
  integration-tests:
    name: Asterisk integration tests (arm64)
    runs-on: ubuntu-24.04-arm
    env:
      VCPKG_ARCHIVES_DIR: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - uses: actions/checkout@v6

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_ARCHIVES_DIR"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-arm64-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}
          restore-keys: |
            vcpkg-linux-arm64-

      - name: Build dev image + start Asterisk
        run: docker compose -f tools/dev/docker-compose.yml up -d --build

      - name: Configure
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            cmake --preset linux

      - name: Build
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            cmake --build --preset linux

      - name: Run integration tests
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c "cd /workspace/build/linux && \
              ctest --output-on-failure -L integration"

      - name: Asterisk logs on failure
        if: failure()
        run: docker compose -f tools/dev/docker-compose.yml logs asterisk

      - name: Tear down
        if: always()
        run: docker compose -f tools/dev/docker-compose.yml down -v

      - name: Save vcpkg binary cache
        if: success() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

  # Routine PRs do not run this job. Platform packages are built by the
  # tag-triggered release-{macos,linux,windows}.yml workflows, which are the
  # single source of truth for signing, packaging, and publishing.

name: CI

on:
  pull_request:
    # Docs-only changes don't need a Linux dev-container build.
    # CLAUDE.md / docs/ / web/ / LICENSE / .gitignore are pure text and
    # cannot break the code, so skip CI entirely for PRs that change
    # only these. A mixed PR (e.g. .cpp + .md) still triggers CI because
    # at least one path is not ignored.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'web/**'
      - 'LICENSE'
      - '.gitignore'

# Auto-cancel older runs on the same PR when a new push arrives. Without
# this, every force-push during an iteration stacks another full Linux
# dev-container build on top of the still-queued previous one. The
# concurrency group is keyed on workflow + ref (= refs/pull/N/merge for PRs)
# so only same-PR queues are collapsed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-dev-container:
    name: Linux dev container build + unit tests
    runs-on: ubuntu-22.04
    env:
      VCPKG_ARCHIVES_DIR: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_ARCHIVES_DIR"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}
          restore-keys: |
            vcpkg-linux-partial-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}-
            vcpkg-linux-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: tools/dev
          load: true
          tags: compactphone-dev:latest
          cache-from: type=gha,scope=compactphone-dev-${{ runner.os }}
          cache-to: type=gha,scope=compactphone-dev-${{ runner.os }},mode=max

      - name: Start dev container
        run: docker compose -f tools/dev/docker-compose.yml up -d dev

      - name: Configure
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            cmake --preset linux

      - name: Build
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            cmake --build --preset linux

      - name: Run unit tests
        # Full suite now that #17's two halves are fixed:
        # - Keychain (EVP_PKEY_HKDF crash) → switched to EVP_KDF in #23
        # - SipEngine / AccountsManagerUpdate (libsrtp self-test crash
        #   inside hmac_dup -> EVP_MAC_CTX_new) → PJSIP now linked
        #   against system libsrtp2 via --with-external-srtp in the
        #   Dockerfile, bypassing PJSIP's broken-on-OpenSSL3 bundled
        #   copy.
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c "cd /workspace/build/linux && \
              ctest --output-on-failure -L unit"

      # Kept as a safety net: if any test starts crashing again, we
      # get a backtrace inline in the job log instead of just SEGFAULT.
      # gdb installed in-step (not in Dockerfile) so it doesn't
      # invalidate the docker layer cache. test_unit existence is
      # checked first so we don't pile gdb noise on top of an
      # earlier build failure.
      - name: Diagnose segfaults if any (gdb backtrace)
        if: always()
        continue-on-error: true
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c 'set -e
              apt-get update -qq && apt-get install -y -qq --no-install-recommends gdb
              cd /workspace/build/linux
              if [ ! -x ./tests/test_unit ]; then
                echo "test_unit binary not built — skipping gdb diagnostic"
                exit 0
              fi
              ulimit -c unlimited
              for T in \
                "SipEngineLifecycle.StartsAndStops" \
                "AccountsManagerUpdateTest.UpdatePersistsChangedFields"; do
                echo "=== gdb backtrace: $T ==="
                gdb --batch --return-child-result \
                  -ex "set pagination off" \
                  -ex "run --gtest_filter=$T" \
                  -ex "bt full" \
                  -ex "info sharedlibrary" \
                  --args ./tests/test_unit --gtest_filter=$T 2>&1 | \
                  tail -200 || true
                echo
              done'

      # vcpkg writes per-port logs inside the container under
      # /opt/vcpkg/buildtrees/<port>/. Surfacing them on failure means
      # the next debug round does not need a fresh 1-hour build.
      - name: Collect vcpkg logs on failure
        if: failure()
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c 'mkdir -p /workspace/vcpkg-logs && \
              find /opt/vcpkg/buildtrees -maxdepth 2 -name "*.log" -size -50M \
                -exec cp --parents {} /workspace/vcpkg-logs/ \;' || true
      - name: Upload vcpkg logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-logs-linux
          path: vcpkg-logs/
          if-no-files-found: ignore

      - name: Save vcpkg binary cache
        if: success() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Save partial vcpkg binary cache
        if: failure()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-partial-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/dev/triplets/**', 'tools/dev/Dockerfile') }}-${{ github.run_id }}-${{ github.run_attempt }}

  # Routine PRs only run the Linux job above. Platform packages are built by
  # the tag-triggered release-{macos,linux,windows}.yml workflows, which are
  # the single source of truth for signing, packaging, and publishing.

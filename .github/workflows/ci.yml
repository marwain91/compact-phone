name: CI

on:
  pull_request:
    # Docs-only changes don't need a 30-60 min platform-matrix build.
    # CLAUDE.md / docs/ / web/ / LICENSE / .gitignore are pure text and
    # cannot break the code, so skip CI entirely for PRs that change
    # only these. A mixed PR (e.g. .cpp + .md) still triggers CI because
    # at least one path is not ignored.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'web/**'
      - 'LICENSE'
      - '.gitignore'

# Auto-cancel older runs on the same PR when a new push arrives. Without
# this, every force-push during an iteration stacks another full
# platform-matrix build on top of the still-queued previous one — easy
# to end up with 4-5 redundant runs gated on macOS runner pickup. The
# concurrency group is keyed on workflow + ref (= refs/pull/N/merge for
# PRs) so only same-PR queues are collapsed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-dev-container:
    name: Linux dev container build + unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose -f tools/dev/docker-compose.yml build dev

      - name: Start dev container
        run: docker compose -f tools/dev/docker-compose.yml up -d dev

      - name: Configure
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            cmake --preset linux

      - name: Build
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            cmake --build --preset linux

      - name: Run unit tests
        # SipEngineLifecycle tests SEGFAULT in the headless Linux dev
        # container — pjsua2's audio backend init crashes even with the
        # null-dev fallback. Tracked under #17. The Keychain and
        # AccountsManagerUpdate suites were excluded for the same reason
        # but those were rooted in an OpenSSL 3.0.2 provider bug
        # triggered by EVP_PKEY_HKDF; the EVP_KDF rewrite in #23 fixed
        # them, so they're back in the run.
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c "cd /workspace/build/linux && \
              ctest --output-on-failure -L unit \
                --exclude-regex 'SipEngineLifecycle'"

      # vcpkg writes per-port logs inside the container under
      # /opt/vcpkg/buildtrees/<port>/. Surfacing them on failure means
      # the next debug round does not need a fresh 1-hour build.
      - name: Collect vcpkg logs on failure
        if: failure()
        run: |
          docker compose -f tools/dev/docker-compose.yml exec -T dev \
            bash -c 'mkdir -p /workspace/vcpkg-logs && \
              find /opt/vcpkg/buildtrees -maxdepth 2 -name "*.log" -size -2M \
                -exec cp --parents {} /workspace/vcpkg-logs/ \;' || true
      - name: Upload vcpkg logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-logs-linux
          path: vcpkg-logs/
          if-no-files-found: ignore

  build-macos:
    name: macOS native build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        # autoconf-archive ships the m4 macros vcpkg's libb2 port needs
        # for autoreconf; without it cold builds fail. Mirrors the same
        # fix in tools/dev/Dockerfile for the Linux dev container.
        run: brew install cmake ninja pkg-config autoconf autoconf-archive automake libtool

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json') }}

      - name: Setup vcpkg
        run: |
          if [ ! -d vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

      - name: Build PJSIP
        run: |
          curl -sL https://github.com/pjsip/pjproject/archive/refs/tags/2.17.tar.gz | tar -xz
          cd pjproject-2.17
          ./aconfigure --prefix=$HOME/pjproject \
            --disable-shared --enable-static --with-ssl=yes \
            --disable-video --disable-libwebrtc --disable-libyuv \
            --disable-opencore-amr --disable-bcg729 --disable-sdl \
            --disable-ffmpeg --disable-v4l2 --disable-openh264
          make dep && make -j$(sysctl -n hw.ncpu) && make install
          echo "PKG_CONFIG_PATH=$HOME/pjproject/lib/pkgconfig" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset macos

      - name: Build
        run: cmake --build --preset macos

      - name: Run unit tests
        working-directory: build/macos
        run: ctest --output-on-failure -L unit

  build-windows:
    name: Windows native build + unsigned MSI
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-windows-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json') }}

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path vcpkg)) {
            git clone https://github.com/microsoft/vcpkg.git
            .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          "VCPKG_ROOT=$pwd/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install WiX 4
        shell: pwsh
        run: dotnet tool install --global wix

      # PJSIP is built from source instead of via vcpkg because pjsip is
      # not in the vcpkg registry. macOS and Linux do the same — see
      # the build-macos job and tools/dev/Dockerfile respectively.
      # cmake/FindPJSIP.cmake reads PJSIP_ROOT to locate the result.
      - name: Cache PJSIP build
        id: pjsip-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/pjproject-2.17
          key: pjsip-windows-2.17-v1

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build PJSIP
        if: steps.pjsip-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Download + extract pjproject 2.17 (same version as macOS/Linux).
          Invoke-WebRequest `
              -Uri "https://github.com/pjsip/pjproject/archive/refs/tags/2.17.tar.gz" `
              -OutFile pjproject-2.17.tar.gz
          tar -xzf pjproject-2.17.tar.gz

          # PJSIP requires a config_site.h before build — same content as
          # Dockerfile/macOS. PJSUA_MAX_CALLS=32 bumps the default 4 so
          # the app can hold multiple lines / conference calls.
          $cfg = "pjproject-2.17/pjlib/include/pj/config_site.h"
          "#pragma once`n#define PJSUA_MAX_CALLS 32`n" `
              | Set-Content -NoNewline -Encoding ascii $cfg

          # Build static libs, Release config, x64.  PJSIP ships a VS2015
          # solution (.sln); modern msbuild auto-retargets to the runner's
          # v143 toolset on first invocation. /m enables parallel build.
          # Without OpenSSL for now — SIP-TLS / SRTP will be disabled on
          # Windows in this first iteration; tracked as a follow-up.
          Push-Location pjproject-2.17
          msbuild pjproject-vs14.sln /p:Configuration=Release-Static `
              /p:Platform=x64 /m /v:m
          Pop-Location

      - name: Export PJSIP_ROOT
        shell: pwsh
        run: |
          $root = "$pwd/pjproject-2.17"
          "PJSIP_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure
        shell: pwsh
        run: cmake --preset windows

      - name: Build
        shell: pwsh
        run: cmake --build --preset windows

      - name: Run unit tests
        working-directory: build/windows
        shell: pwsh
        run: ctest --output-on-failure -L unit

      - name: Stage runtime (windeployqt)
        shell: pwsh
        run: |
          $stage = "build\windows\stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item build\windows\src\compactphone.exe $stage
          $deploy = Get-ChildItem -Recurse -Filter "windeployqt.exe" `
              -Path vcpkg | Select-Object -First 1
          if ($deploy) {
            & $deploy.FullName --qmldir src\ui\qml --release `
                --no-translations --no-system-d3d-compiler `
                "$stage\compactphone.exe"
          } else {
            Write-Warning "windeployqt.exe not found; MSI will be missing Qt runtime"
          }

      - name: Build unsigned MSI
        shell: pwsh
        run: |
          $version = (Select-String -Path CMakeLists.txt `
              -Pattern 'VERSION (\d+\.\d+\.\d+)').Matches.Groups[1].Value
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          wix build packaging\windows\installer.wxs -arch x64 `
              -d Version=$version `
              -d StageDir=build\windows\stage `
              -out "dist\compactphone-$version-unsigned.msi"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: compactphone-msi-unsigned
          path: dist/*.msi

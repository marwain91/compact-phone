name: Release · macOS

# Fires on every v* tag. Builds the .app, signs + notarizes + staples the
# DMG, and uploads to the matching GitHub Release. Tags containing "-test"
# may produce unsigned dev artifacts; production tags fail if signing and
# notarization secrets are missing.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-sign-publish:
    runs-on: macos-15
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
    steps:
      - uses: actions/checkout@v6

      - name: Validate production signing config
        env:
          REF_NAME: ${{ github.ref_name }}
          P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          if [[ "$REF_NAME" == *"-test"* ]]; then
            echo "Test tag detected; unsigned macOS artifact is allowed."
            exit 0
          fi

          missing=0
          for name in \
            P12_BASE64 \
            P12_PASSWORD \
            DEVELOPER_ID_APP \
            NOTARY_APPLE_ID \
            NOTARY_TEAM_ID \
            NOTARY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "error: $name is required for production macOS releases" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Install build deps
        # autoconf-archive ships the m4 macros vcpkg's libb2 portfile needs
        # for autoreconf; without it cold builds fail with libb2 BUILD_FAILED.
        # Mirrors the fix already in ci.yml and tools/dev/Dockerfile.
        run: brew install cmake ninja pkg-config create-dmg autoconf autoconf-archive automake libtool

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache macOS vcpkg deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-cache
            ${{ github.workspace }}/build/macos/vcpkg_installed
          key: vcpkg-macos-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json', 'tools/release/triplets/arm64-osx.cmake') }}
          restore-keys: |
            vcpkg-macos-deps-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup vcpkg
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          if [ ! -d vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi
          echo "VCPKG_ROOT=$WORKSPACE/vcpkg" >> "$GITHUB_ENV"

      - name: Build PJSIP
        run: |
          curl -sL https://github.com/pjsip/pjproject/archive/refs/tags/2.17.tar.gz | tar -xz
          cd pjproject-2.17
          ./aconfigure --prefix="$HOME/pjproject" \
            --disable-shared --enable-static --with-ssl=yes \
            --disable-video --disable-libwebrtc --disable-libyuv \
            --disable-opencore-amr --disable-bcg729 --disable-sdl \
            --disable-ffmpeg --disable-v4l2 --disable-openh264
          make dep && make -j"$(sysctl -n hw.ncpu)" && make install
          echo "PKG_CONFIG_PATH=$HOME/pjproject/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake --preset macos \
            -DVCPKG_OVERLAY_TRIPLETS="${{ github.workspace }}/tools/release/triplets"

      - name: Build
        run: cmake --build --preset macos

      - name: Import signing identity
        env:
          P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "APPLE_DEVELOPER_ID_P12_BASE64 not set — skipping import"
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASS="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 "$KEYCHAIN_PATH"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize DMG
        env:
          DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Stable filename (no version) so the landing-page Download
          # button can hardcode .../releases/latest/download/Compact-Phone-macOS.dmg
          # and never need updating per release. The version is still
          # carried in the appcast's sparkle:shortVersionString and
          # inside the .app's Info.plist.
          if [ -z "$DEVELOPER_ID_APP" ]; then
            if [[ "$REF_NAME" != *"-test"* ]]; then
              echo "error: signing identity missing for production macOS release" >&2
              exit 1
            fi
            echo "Signing identity missing — producing unsigned DMG"
            mkdir -p dist
            STAGE=$(mktemp -d)
            cp -R "build/macos/src/Compact Phone.app" "$STAGE/"
            ln -s /Applications "$STAGE/Applications"
            hdiutil create -volname "Compact Phone" -srcfolder "$STAGE" \
              -ov -format UDZO "dist/Compact-Phone-macOS.dmg"
          else
            ./packaging/macos/build-dmg.sh
          fi

      # Generate the appcast that UpdateChecker fetches at
      # https://github.com/marwain91/compact-phone/releases/latest/download/appcast-macos.xml
      # Sparkle 2.x format. Signed with EdDSA when the secret is set
      # (it's not strictly required by our in-tree UpdateChecker yet,
      # but it's the right hygiene for when we adopt the real Sparkle
      # framework).
      - name: Generate macOS appcast
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python3 -m pip install --quiet --user cryptography || true
          VERSION="${REF_NAME#v}"
          DMG=$(ls dist/*.dmg | head -1)
          DMG_NAME=$(basename "$DMG")
          python3 tools/release/generate-appcast.py \
            --version "$VERSION" \
            --asset-url "https://github.com/marwain91/compact-phone/releases/download/${REF_NAME}/${DMG_NAME}" \
            --asset-file "$DMG" \
            --os macos \
            --output dist/appcast-macos.xml

      - name: Upload DMG + appcast to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/appcast-macos.xml
          fail_on_unmatched_files: true

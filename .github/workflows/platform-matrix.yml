name: Platform matrix (manual)

# Cross-platform validation build for macOS + Windows. Runs manually
# only — use this when a PR touches cross-platform code (PJSIP /
# Keychain / packaging / FindPJSIP.cmake) and you want pre-merge
# verification that nothing breaks on the non-Linux platforms.
#
# Routine PRs run only the Linux job in ci.yml — saves 30-60 min of
# macOS + Windows runner time per iteration. macOS pool contention is
# real; reserve those minutes for actual release builds.
#
# Tag pushes (v*) trigger release-{macos,windows}.yml separately,
# which ALSO build the platforms AND sign + notarise + publish. So
# this workflow is purely a manual dry-run safety check.
#
# Trigger from GitHub UI: Actions tab → "Platform matrix (manual)" →
# "Run workflow" → pick the branch / tag in the dropdown → Run.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS native build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        # autoconf-archive ships the m4 macros vcpkg's libb2 port needs
        # for autoreconf; without it cold builds fail. Mirrors the same
        # fix in tools/dev/Dockerfile for the Linux dev container.
        run: brew install cmake ninja pkg-config autoconf autoconf-archive automake libtool

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        run: |
          if [ ! -d vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

      - name: Build PJSIP
        run: |
          curl -sL https://github.com/pjsip/pjproject/archive/refs/tags/2.17.tar.gz | tar -xz
          cd pjproject-2.17
          ./aconfigure --prefix=$HOME/pjproject \
            --disable-shared --enable-static --with-ssl=yes \
            --disable-video --disable-libwebrtc --disable-libyuv \
            --disable-opencore-amr --disable-bcg729 --disable-sdl \
            --disable-ffmpeg --disable-v4l2 --disable-openh264
          make dep && make -j$(sysctl -n hw.ncpu) && make install
          echo "PKG_CONFIG_PATH=$HOME/pjproject/lib/pkgconfig" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake --preset macos \
            -DVCPKG_OVERLAY_TRIPLETS="${{ github.workspace }}/tools/release/triplets"

      - name: Build
        run: cmake --build --preset macos

      - name: Run unit tests
        working-directory: build/macos
        run: ctest --output-on-failure --timeout 120 -L unit

  build-windows:
    name: Windows native build + unsigned MSI
    runs-on: windows-2022
    # PJSIP is built from source at C:\p, vcpkg lives at C:\v, and CMake
    # builds at C:\b to stay under Windows MAX_PATH during Qt/vcpkg builds.
    # This job is intentionally blocking now that FindPJSIP.cmake supports
    # the Windows source-built PJSIP layout.
    steps:
      - uses: actions/checkout@v4

      - name: Restore vcpkg + installed deps cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\v
            C:\b\vcpkg_installed
          key: vcpkg-windows-shortpath-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json') }}
          restore-keys: |
            vcpkg-windows-shortpath-

      - name: Setup vcpkg (at C:\v)
        shell: pwsh
        run: |
          if (-not (Test-Path C:\v)) {
            git clone https://github.com/microsoft/vcpkg.git C:\v
            C:\v\bootstrap-vcpkg.bat -disableMetrics
          }
          "VCPKG_ROOT=C:\v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install WiX 4
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Cache PJSIP build (short path)
        id: pjsip-cache
        uses: actions/cache/restore@v4
        with:
          path: C:\p
          key: pjsip-windows-2.17-v6-md

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build PJSIP (at C:\p)
        if: steps.pjsip-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path C:\p -Force | Out-Null
          Invoke-WebRequest `
              -Uri "https://github.com/pjsip/pjproject/archive/refs/tags/2.17.tar.gz" `
              -OutFile C:\p\pjproject-2.17.tar.gz
          Push-Location C:\p
          tar -xzf pjproject-2.17.tar.gz

          $cfg = Join-Path $PWD "pjproject-2.17\pjlib\include\pj\config_site.h"
          [System.IO.File]::WriteAllText(
              $cfg, "#pragma once`n#define PJSUA_MAX_CALLS 32`n")

          $files = Get-ChildItem pjproject-2.17 -Recurse `
              -Include *.vcxproj,*.props,*.vsprops
          Write-Host "Found $($files.Count) MSBuild config files to scan"
          $patched = 0
          foreach ($f in $files) {
              $orig = Get-Content $f.FullName -Raw
              if ($null -eq $orig) { continue }
              $new = $orig -replace `
                  '(<RuntimeLibrary[^>]*>)MultiThreaded(Debug)?(?!DLL)(</RuntimeLibrary>)', `
                  '$1MultiThreaded$2DLL$3'
              if ($new -ne $orig) {
                  [System.IO.File]::WriteAllText($f.FullName, $new)
                  $patched++
                  Write-Host "  patched: $($f.FullName.Substring('C:\p\'.Length))"
              }
          }
          Write-Host "Patched $patched files"
          Write-Host "=== Surviving MultiThreaded (non-DLL) RuntimeLibrary refs ==="
          Get-ChildItem pjproject-2.17 -Recurse `
              -Include *.vcxproj,*.props,*.vsprops `
              | Select-String -Pattern '<RuntimeLibrary[^>]*>MultiThreaded(Debug)?</RuntimeLibrary>' `
              | Format-Table -AutoSize

          Push-Location pjproject-2.17
          # Build the aggregate static-library project instead of the full
          # solution. The full solution also links upstream test executables
          # such as pjmedia_test.exe; those are irrelevant here and can fail
          # independently of the libraries CompactPhone needs.
          msbuild pjsip-apps\build\libpjproject.vcxproj `
              /p:Configuration=Release-Static `
              /p:Platform=x64 /m /v:m
          Pop-Location
          Pop-Location

      - name: Save PJSIP build cache
        if: success() && steps.pjsip-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: C:\p
          key: ${{ steps.pjsip-cache.outputs.cache-primary-key }}

      - name: Export PJSIP_ROOT
        shell: pwsh
        run: |
          "PJSIP_ROOT=C:\p\pjproject-2.17" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset windows -B C:\b `
              -DCMAKE_TOOLCHAIN_FILE=C:/v/scripts/buildsystems/vcpkg.cmake

      - name: Save vcpkg + installed deps cache
        if: success() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            C:\v
            C:\b\vcpkg_installed
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        shell: pwsh
        run: cmake --build C:\b

      - name: Run unit tests
        working-directory: C:\b
        shell: pwsh
        run: ctest --output-on-failure -L unit

      - name: Stage runtime (windeployqt)
        shell: pwsh
        run: |
          $stage = "C:\b\stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $app = Get-ChildItem -Path C:\b -Recurse -Filter "compactphone.exe" `
              -File -ErrorAction SilentlyContinue `
              | Where-Object { $_.FullName -notlike "$stage\*" } `
              | Sort-Object { $_.FullName.Length } `
              | Select-Object -First 1
          if (-not $app) {
            Get-ChildItem -Path C:\b -Recurse -Filter "*.exe" -File `
                -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw "compactphone.exe not found under C:\b"
          }
          Copy-Item $app.FullName "$stage\compactphone.exe"
          $deploy = Get-ChildItem -Recurse -Filter "windeployqt.exe" `
              -Path C:\b\vcpkg_installed,C:\v -ErrorAction SilentlyContinue `
              | Select-Object -First 1
          if ($deploy) {
            & $deploy.FullName --qmldir src\ui\qml --release `
                --no-translations --no-system-d3d-compiler `
                "$stage\compactphone.exe"
          } else {
            Write-Warning "windeployqt.exe not found; MSI will be missing Qt runtime"
          }

      - name: Build unsigned MSI
        shell: pwsh
        run: |
          $version = (Select-String -Path CMakeLists.txt `
              -Pattern 'VERSION (\d+\.\d+\.\d+)').Matches.Groups[1].Value
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          wix build packaging\windows\installer.wxs -arch x64 `
              -d Version=$version `
              -d StageDir=C:\b\stage `
              -out "dist\compactphone-$version-unsigned.msi"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: compactphone-msi-unsigned
          path: dist/*.msi

name: Linux builder image

# Builds and publishes the reusable Linux builder image used by PR CI and
# Linux release packaging. Manual only: main merges must not start expensive
# Docker/vcpkg builds. Run this explicitly before a release when the image
# recipe or dependency manifests changed.

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/linux-builder" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Linux builder
        uses: docker/build-push-action@v7
        with:
          context: tools/dev
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha,scope=linux-builder-${{ runner.os }}
          cache-to: type=gha,scope=linux-builder-${{ runner.os }},mode=max

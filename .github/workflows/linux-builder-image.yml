name: Linux builder image

# Builds and publishes the reusable Linux builder image used by PR CI and
# Linux release packaging. This moves the expensive toolchain/PJSIP image
# layers out of every release tag run.

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/linux-builder-image.yml"
      - "tools/dev/Dockerfile"
      - "tools/dev/docker-compose.yml"
      - "tools/dev/triplets/**"
      - "vcpkg.json"
      - "vcpkg-configuration.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/linux-builder" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Linux builder
        uses: docker/build-push-action@v6
        with:
          context: tools/dev
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha,scope=linux-builder-${{ runner.os }}
          cache-to: type=gha,scope=linux-builder-${{ runner.os }},mode=max

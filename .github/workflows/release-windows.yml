name: Release · Windows

# Fires on every v* tag. Builds the MSI, signs it, and uploads to the
# matching GitHub Release. Tags containing "-test" may produce unsigned dev
# artifacts; production tags fail if signing is not configured.
#
# Keep the C:\v, C:\p, C:\b short-path layout and PJSIP cache key stable;
# Windows Qt/vcpkg paths get long enough to hit MAX_PATH otherwise.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0-test7"
        required: true
        type: string
      source_ref:
        description: "Git ref to build. Empty = selected workflow ref."
        required: false
        default: ""
        type: string

permissions:
  contents: write   # needed to attach assets to the release

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

jobs:
  build-sign-publish:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Validate release tag
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notlike "v*") {
            throw "release tag must start with v; got '$env:RELEASE_TAG'"
          }

      - name: Validate production signing config
        shell: pwsh
        env:
          REF_NAME: ${{ env.RELEASE_TAG }}
          CODE_SIGN_THUMBPRINT: ${{ secrets.CODE_SIGN_THUMBPRINT }}
        run: |
          if ($env:REF_NAME -like "*-test*") {
            Write-Host "Test tag detected; unsigned Windows artifact is allowed."
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:CODE_SIGN_THUMBPRINT)) {
            throw "CODE_SIGN_THUMBPRINT is required for production Windows releases"
          }

      - name: Restore vcpkg + installed deps cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\v
            C:\b\vcpkg_installed
          key: vcpkg-windows-shortpath-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json') }}
          restore-keys: |
            vcpkg-windows-shortpath-

      - name: Setup vcpkg (at C:\v)
        shell: pwsh
        run: |
          if (-not (Test-Path C:\v)) {
            git clone https://github.com/microsoft/vcpkg.git C:\v
            C:\v\bootstrap-vcpkg.bat -disableMetrics
          }
          "VCPKG_ROOT=C:\v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install WiX 4
        shell: pwsh
        run: dotnet tool install --global wix --version 4.0.6

      - name: Cache PJSIP build (short path)
        id: pjsip-cache
        uses: actions/cache/restore@v4
        with:
          path: C:\p
          key: pjsip-windows-2.17-v6-md

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build PJSIP (at C:\p)
        if: steps.pjsip-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path C:\p -Force | Out-Null
          Invoke-WebRequest `
              -Uri "https://github.com/pjsip/pjproject/archive/refs/tags/2.17.tar.gz" `
              -OutFile C:\p\pjproject-2.17.tar.gz
          Push-Location C:\p
          tar -xzf pjproject-2.17.tar.gz

          $cfg = Join-Path $PWD "pjproject-2.17\pjlib\include\pj\config_site.h"
          [System.IO.File]::WriteAllText(
              $cfg, "#pragma once`n#define PJSUA_MAX_CALLS 32`n")

          $files = Get-ChildItem pjproject-2.17 -Recurse `
              -Include *.vcxproj,*.props,*.vsprops
          Write-Host "Found $($files.Count) MSBuild config files to scan"
          $patched = 0
          foreach ($f in $files) {
              $orig = Get-Content $f.FullName -Raw
              if ($null -eq $orig) { continue }
              $new = $orig -replace `
                  '(<RuntimeLibrary[^>]*>)MultiThreaded(Debug)?(?!DLL)(</RuntimeLibrary>)', `
                  '$1MultiThreaded$2DLL$3'
              if ($new -ne $orig) {
                  [System.IO.File]::WriteAllText($f.FullName, $new)
                  $patched++
                  Write-Host "  patched: $($f.FullName.Substring('C:\p\'.Length))"
              }
          }
          Write-Host "Patched $patched files"
          Write-Host "=== Surviving MultiThreaded (non-DLL) RuntimeLibrary refs ==="
          Get-ChildItem pjproject-2.17 -Recurse `
              -Include *.vcxproj,*.props,*.vsprops `
              | Select-String -Pattern '<RuntimeLibrary[^>]*>MultiThreaded(Debug)?</RuntimeLibrary>' `
              | Format-Table -AutoSize

          Push-Location pjproject-2.17
          # Build the aggregate static-library project instead of the full
          # solution. The full solution also links upstream test executables
          # such as pjmedia_test.exe; those are irrelevant here and can fail
          # independently of the libraries CompactPhone needs.
          msbuild pjsip-apps\build\libpjproject.vcxproj `
              /p:Configuration=Release-Static `
              /p:Platform=x64 /m /v:m
          Pop-Location
          Pop-Location

      - name: Save PJSIP build cache
        if: success() && steps.pjsip-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: C:\p
          key: ${{ steps.pjsip-cache.outputs.cache-primary-key }}

      - name: Export PJSIP_ROOT
        shell: pwsh
        run: |
          "PJSIP_ROOT=C:\p\pjproject-2.17" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset windows -B C:\b `
              -DCMAKE_TOOLCHAIN_FILE=C:/v/scripts/buildsystems/vcpkg.cmake

      - name: Save vcpkg + installed deps cache
        if: success() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            C:\v
            C:\b\vcpkg_installed
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        shell: pwsh
        run: cmake --build C:\b

      - name: Stage runtime (windeployqt)
        shell: pwsh
        run: |
          $stage = "C:\b\stage"
          if (Test-Path $stage) {
            Remove-Item $stage -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $app = Get-ChildItem -Path C:\b -Recurse -Filter "compactphone.exe" `
              -File -ErrorAction SilentlyContinue `
              | Where-Object { $_.FullName -notlike "$stage\*" } `
              | Sort-Object { $_.FullName.Length } `
              | Select-Object -First 1
          if (-not $app) {
            Get-ChildItem -Path C:\b -Recurse -Filter "*.exe" -File `
                -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw "compactphone.exe not found under C:\b"
          }
          Copy-Item $app.FullName "$stage\compactphone.exe"
          $deploy = Get-ChildItem -Recurse -Filter "windeployqt.exe" `
              -Path C:\b\vcpkg_installed,C:\v -ErrorAction SilentlyContinue `
              | Select-Object -First 1
          if ($deploy) {
            & $deploy.FullName --qmldir src\ui\qml --release `
                --no-translations --no-system-d3d-compiler `
                "$stage\compactphone.exe"
          } else {
            throw "windeployqt.exe not found; MSI would be missing Qt runtime"
          }
          Copy-Item LICENSE "$stage\LICENSE"
          Copy-Item THIRD_PARTY_LICENSES.md "$stage\THIRD_PARTY_LICENSES.md"

      - name: Build MSI
        shell: pwsh
        env:
          REF_NAME: ${{ env.RELEASE_TAG }}
        run: |
          # Stable filename — landing page can hardcode
          # .../releases/latest/download/Compact-Phone-Windows.msi
          $version = $env:REF_NAME -replace '^v', ''
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          .\packaging\windows\generate-stage-wxs.ps1 `
              -StageDir C:\b\stage `
              -OutputPath dist\stage-files.wxs
          wix build packaging\windows\installer.wxs dist\stage-files.wxs -arch x64 `
              -d Version=$version `
              -out "dist\Compact-Phone-Windows.msi"

      - name: Sign MSI (gated on cert secret)
        shell: pwsh
        env:
          CODE_SIGN_THUMBPRINT: ${{ secrets.CODE_SIGN_THUMBPRINT }}
          TIMESTAMP_URL: ${{ vars.TIMESTAMP_URL }}
          REF_NAME: ${{ env.RELEASE_TAG }}
        run: |
          if ([string]::IsNullOrEmpty($env:CODE_SIGN_THUMBPRINT)) {
            if ($env:REF_NAME -like "*-test*") {
              Write-Host "CODE_SIGN_THUMBPRINT not set — uploading unsigned test MSI"
              exit 0
            }
            throw "CODE_SIGN_THUMBPRINT is required for production Windows releases"
          }
          $ts = if ([string]::IsNullOrEmpty($env:TIMESTAMP_URL)) {
            "http://timestamp.digicert.com" } else { $env:TIMESTAMP_URL }
          & "signtool" sign /v /sha1 $env:CODE_SIGN_THUMBPRINT `
              /tr $ts /td sha256 /fd sha256 dist\*.msi

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*.msi
          fail_on_unmatched_files: true

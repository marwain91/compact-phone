name: Release · Windows

# Fires on every v* tag. Builds the MSI, signs it if the cert secrets are
# present, and uploads to the matching GitHub Release. The signing step
# is a no-op when CODE_SIGN_THUMBPRINT is empty, which keeps unsigned dev
# tags working.
#
# Build recipe mirrors ci.yml's build-windows job — see that file for the
# why behind every gotcha (MAX_PATH short paths, /MD vcxproj patch, MSVC
# vs MinGW, setup-msbuild + VS-bundled-vcpkg trap). Keep in sync.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to attach assets to the release

jobs:
  build-sign-publish:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      # See ci.yml for the Windows MAX_PATH explanation. Same C:\v / C:\p /
      # C:\b layout applies here.
      - name: Cache vcpkg (short path)
        uses: actions/cache@v4
        with:
          path: C:\v
          key: vcpkg-windows-shortpath-${{ hashFiles('vcpkg-configuration.json', 'vcpkg.json') }}
          save-always: true

      - name: Setup vcpkg (at C:\v)
        shell: pwsh
        run: |
          if (-not (Test-Path C:\v)) {
            git clone https://github.com/microsoft/vcpkg.git C:\v
            C:\v\bootstrap-vcpkg.bat -disableMetrics
          }
          "VCPKG_ROOT=C:\v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install WiX 4
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Cache PJSIP build (short path)
        id: pjsip-cache
        uses: actions/cache@v4
        with:
          path: C:\p
          # Keep this key in sync with ci.yml. Bump suffix when build
          # flags change in a way that affects symbol/CRT linkage.
          key: pjsip-windows-2.17-v3-md
          save-always: true

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build PJSIP (at C:\p)
        if: steps.pjsip-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path C:\p -Force | Out-Null
          Invoke-WebRequest `
              -Uri "https://github.com/pjsip/pjproject/archive/refs/tags/2.17.tar.gz" `
              -OutFile C:\p\pjproject-2.17.tar.gz
          Push-Location C:\p
          tar -xzf pjproject-2.17.tar.gz

          $cfg = "pjproject-2.17/pjlib/include/pj/config_site.h"
          "#pragma once`n#define PJSUA_MAX_CALLS 32`n" `
              | Set-Content -NoNewline -Encoding ascii $cfg

          # Patch vcxproj from /MT to /MD — see CLAUDE.md "PJSIP on
          # Windows — must build with /MD" for full rationale.
          Get-ChildItem pjproject-2.17 -Recurse -Filter *.vcxproj | ForEach-Object {
              (Get-Content $_.FullName -Raw) `
                  -replace '<RuntimeLibrary>MultiThreaded</RuntimeLibrary>', `
                           '<RuntimeLibrary>MultiThreadedDLL</RuntimeLibrary>' `
                  | Set-Content -NoNewline $_.FullName
          }

          Push-Location pjproject-2.17
          msbuild pjproject-vs14.sln /p:Configuration=Release-Static `
              /p:Platform=x64 /m /v:m
          Pop-Location
          Pop-Location

      - name: Export PJSIP_ROOT
        shell: pwsh
        run: |
          "PJSIP_ROOT=C:\p\pjproject-2.17" | Out-File -FilePath $env:GITHUB_ENV -Append

      # MSVC dev env before configure — windows-2022 ships MinGW gcc too
      # and CMake auto-picks the first compiler in PATH. ilammy/msvc-dev-cmd
      # runs vcvarsall.bat which prepends cl.exe.
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # buildDir overridden to C:\b for MAX_PATH headroom. Explicit
      # toolchain file because setup-msbuild + vsdevcmd add VS's bundled
      # vcpkg to PATH which would otherwise win over our C:\v.
      - name: Configure
        shell: pwsh
        run: |
          cmake --preset windows -B C:\b `
              -DCMAKE_TOOLCHAIN_FILE=C:/v/scripts/buildsystems/vcpkg.cmake

      - name: Build
        shell: pwsh
        run: cmake --build C:\b

      - name: Stage runtime (windeployqt)
        shell: pwsh
        run: |
          $stage = "C:\b\stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item C:\b\src\compactphone.exe $stage
          $deploy = Get-ChildItem -Recurse -Filter "windeployqt.exe" `
              -Path C:\b\vcpkg_installed,C:\v -ErrorAction SilentlyContinue `
              | Select-Object -First 1
          if ($deploy) {
            & $deploy.FullName --qmldir src\ui\qml --release `
                --no-translations --no-system-d3d-compiler `
                "$stage\compactphone.exe"
          } else {
            Write-Warning "windeployqt.exe not found; MSI will be missing Qt runtime"
          }

      - name: Build MSI
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Stable filename — landing page can hardcode
          # .../releases/latest/download/Compact-Phone-Windows.msi
          $version = $env:REF_NAME -replace '^v', ''
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          wix build packaging\windows\installer.wxs -arch x64 `
              -d Version=$version `
              -d StageDir=C:\b\stage `
              -out "dist\Compact-Phone-Windows.msi"

      - name: Sign MSI (gated on cert secret)
        shell: pwsh
        env:
          CODE_SIGN_THUMBPRINT: ${{ secrets.CODE_SIGN_THUMBPRINT }}
          TIMESTAMP_URL: ${{ vars.TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrEmpty($env:CODE_SIGN_THUMBPRINT)) {
            Write-Host "CODE_SIGN_THUMBPRINT not set — uploading unsigned MSI"
            exit 0
          }
          $ts = if ([string]::IsNullOrEmpty($env:TIMESTAMP_URL)) {
            "http://timestamp.digicert.com" } else { $env:TIMESTAMP_URL }
          & "signtool" sign /v /sha1 $env:CODE_SIGN_THUMBPRINT `
              /tr $ts /td sha256 /fd sha256 dist\*.msi

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi
          fail_on_unmatched_files: true
